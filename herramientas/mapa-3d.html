#levels{bottom:86px;left:50%;transform:translateX(-50%);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}

.b-practice{background:rgba(239,241,236,.12);color:var(--paper);border:1px solid rgba(216,218,209,.35);}
.b-test{background:var(--red);color:var(--paper);}

#loading .star{font-size:34px;animation:spin 2.4s linear infinite;}

const legend=document.getElementById('legend');let arqFilter=null;
Object.entries(ARQ).forEach(([k,v])=>{
 const ch=document.createElement('div');ch.className='chip';
 ch.innerHTML='<span class="dot" style="background:#'+v.c.toString(16).padStart(6,'0')+'"></span>'+v.n;
 ch.addEventListener('click',()=>{arqFilter=arqFilter===k?null:k;
  legend.querySelectorAll('.chip').forEach(c=>c.classList.remove('on','dim'));
  if(arqFilter){ch.classList.add('on');legend.querySelectorAll('.chip').forEach(c=>{if(c!==ch)c.classList.add('dim');});}
  applyFilter();});
 legend.appendChild(ch);});
// --- search ---
const searchEl=document.getElementById('search');let term='';
searchEl.addEventListener('input',()=>{term=searchEl.value.trim().toLowerCase();applyFilter();});
searchEl.addEventListener('keydown',e=>{if(e.key==='Enter'){const m=nodes.find(n=>n.vis);if(m){openPanel(m.t);}}});
function match(t){
 if(arqFilter&&t.q!==arqFilter)return false;
 if(term&&!(t.t.toLowerCase().includes(term)||t.a.toLowerCase().includes(term)||t.n.toLowerCase().includes(term)))return false;
 return true;}
const DIMCOL=new THREE.Color(0x3E4E66);
function applyFilter(){
 let lit=0;
 nodes.forEach(n=>{n.vis=match(n.t);
  const off=progressMode&&!n.lit;
  n.mesh.material.color.set(off?DIMCOL:new THREE.Color((ARQ[n.t.q]||ARQ.tiempo_verbal).c));
  n.mesh.material.opacity=n.vis?(off?.4:1):.08;
  n.glow.material.opacity=n.vis?(off?.08:.85):.03;
  n.gbase=n.vis?(off?3.5:7.5):4;
  if(n.lit)lit++;});
 threads.forEach(th=>{const on=(!arqFilter||th.arq===arqFilter)&&!term;th.line.material.opacity=on?(progressMode?.12:.28):.04;});
 const pc=document.getElementById('progress-count');
 pc.textContent=progressMode?('\u2726 '+lit+' / '+nodes.length+' stars lit \u2014 pass a Test to light one'):'';}
applyFilter();
// --- animate ---
const clock=new THREE.Clock();
let frames=0;
function animate(){requestAnimationFrame(animate);
 const t=clock.getElapsedTime();
 if(performance.now()-lastAct>4000&&!sphGoal){sph.th+=.0011;applyCam();}
 if(sphGoal){sph.r+=(sphGoal.r-sph.r)*.06;sph.th+=(sphGoal.th-sph.th)*.06;sph.ph+=(sphGoal.ph-sph.ph)*.06;
  if(Math.abs(sphGoal.r-sph.r)<.5)sphGoal=null;}
 if(targetGoal){target.lerp(targetGoal,.07);if(target.distanceTo(targetGoal)<.4)targetGoal=null;}
 if(sphGoal||targetGoal)applyCam();
 nodes.forEach((n,i)=>{const pulse=1+Math.sin(t*1.6+n.phase)*.18;
  n.glow.scale.setScalar(n.gbase*pulse);
  const hv=hovered&&hovered.id===n.t.id;
  n.mesh.scale.setScalar(hv?1.8:1);});
 root.rotation.y=Math.sin(t*.05)*.02;
 renderer.render(scene,camera);
 if(++frames===2){const L=document.getElementById('loading');L.style.opacity=0;setTimeout(()=>L.remove(),700);}}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity=0;},9000);

</script>
</body>
</html>
