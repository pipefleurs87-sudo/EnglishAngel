<style>
:root{--ink:#1B2A41;--paper:#EFF1EC;--red:#B23A2E;--gold:#C9962F;--muted:#6B7079;--line:#D8DAD1;--space:#0A111C;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:radial-gradient(ellipse at 50% 20%, #14213A 0%, var(--space) 75%);font-family:'IBM Plex Sans',sans-serif;color:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px;}
.stars{position:fixed;inset:0;pointer-events:none;}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--paper);opacity:.5;animation:tw 3s infinite;}
@keyframes tw{50%{opacity:.1;}}
.card{position:relative;z-index:2;width:min(560px,94vw);background:rgba(16,26,42,.9);border:1px solid rgba(201,150,47,.35);border-radius:18px;padding:36px 34px;backdrop-filter:blur(8px);box-shadow:0 18px 60px rgba(0,0,0,.5);}
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;color:var(--gold);}
h1{font-family:'Source Serif 4',serif;font-size:clamp(24px,4vw,32px);margin:10px 0 8px;}
.cursive{font-family:'Caveat',cursive;font-size:20px;color:var(--gold);}
p.intro{color:#B8BFC8;font-size:14.5px;line-height:1.65;margin:14px 0 22px;}
button.big{width:100%;background:var(--gold);border:none;color:#14213A;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:16px;padding:14px;border-radius:12px;cursor:pointer;transition:filter .2s;}
button.big:hover{filter:brightness(1.12);}
.qnum{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.dots{display:flex;gap:4px;flex-wrap:wrap;}
.dots i{width:7px;height:7px;border-radius:50%;background:rgba(239,241,236,.18);}
.dots i.done{background:var(--gold);}
.dots i.bad{background:var(--red);}
.qtext{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8b94a0;margin-bottom:6px;letter-spacing:.8px;}
.opt{display:block;width:100%;text-align:left;background:rgba(239,241,236,.06);border:1px solid rgba(216,218,209,.25);color:var(--paper);font-family:'Source Serif 4',serif;font-size:17.5px;padding:15px 17px;border-radius:12px;cursor:pointer;margin-top:11px;transition:all .15s;line-height:1.4;}
.opt:hover{border-color:var(--gold);background:rgba(201,150,47,.12);}
.opt.right{border-color:#7FA65A;background:rgba(127,166,90,.18);}
.opt.wrong{border-color:var(--red);background:rgba(178,58,46,.18);}
.lvltag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8b94a0;}
.result-star{font-size:52px;text-align:center;animation:pop .5s;}
@keyframes pop{0%{transform:scale(.3);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.result-lvl{font-family:'Source Serif 4',serif;font-size:64px;font-weight:700;text-align:center;color:var(--gold);line-height:1.1;}
.result-txt{text-align:center;color:#B8BFC8;font-size:14.5px;line-height:1.6;margin:12px 0 24px;}
a.act{display:block;text-align:center;text-decoration:none;font-weight:600;font-size:15px;padding:13px;border-radius:12px;margin-top:10px;}
a.map{background:var(--gold);color:#14213A;}
a.home{background:rgba(239,241,236,.1);color:var(--paper);border:1px solid rgba(216,218,209,.3);}
a.act:hover{filter:brightness(1.12);}
.back{position:fixed;top:18px;left:22px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9AA3AE;text-decoration:none;z-index:3;}
.back:hover{color:var(--gold);}
.feedback{font-family:'Caveat',cursive;font-size:21px;color:var(--gold);min-height:28px;margin-top:12px;text-align:center;}
</style>
</head>

<script>
const DIAGS=[{"id": "a1-adjectives-people-things-01", "n": "A1", "t": "Adjectives — Describing People & Things", "a": "They are students talls.", "b": "They are tall students.", "c": "b"}, {"id": "a1-articles-01", "n": "A1", "t": "Articles — a / an / the", "a": "She is teacher.", "b": "She is a teacher.", "c": "b"}, {"id": "a1-demonstratives-01", "n": "A1", "t": "This / That / These / Those", "a": "This shoes are nice.", "b": "These shoes are nice.", "c": "b"}, {"id": "a1-family-possessive-s-01", "n": "A1", "t": "Family & Possessive 's", "a": "My mother mother is my grandmother.", "b": "My mother's mother is my grandmother.", "c": "b"}, {"id": "a1-have-got-01", "n": "A1", "t": "Have got — Possessions", "a": "Do you have got a pen?", "b": "Have you got a pen?", "c": "b"}, {"id": "a1-imperatives-01", "n": "A1", "t": "Imperatives — Instructions & Directions", "a": "No touch the oven!", "b": "Don't touch the oven!", "c": "b"}, {"id": "a1-modal-can-ability-01", "n": "A1", "t": "Modal Verb 'Can' — Ability & the Body", "a": "I can to hear with my ears.", "b": "I can hear with my ears.", "c": "b"}, {"id": "a1-modal-have-to-01", "n": "A1", "t": "Modal 'Have to' — Obligations at Work & School", "a": "She have to work on Saturday.", "b": "She has to work on Saturday.", "c": "b"}, {"id": "a1-modal-must-duties-01", "n": "A1", "t": "Modal Verb 'Must' — Duties at Home", "a": "I must to clean my room.", "b": "I must clean my room.", "c": "b"}, {"id": "a1-modal-should-advice-01", "n": "A1", "t": "Modal Verb 'Should' — Advice & Suggestions", "a": "You should to try the fish.", "b": "You should try the fish.", "c": "b"}, {"id": "a1-modal-would-like-01", "n": "A1", "t": "Would like — Wishes & Polite Offers", "a": "I would like go to Japan.", "b": "I would like to go to Japan.", "c": "b"}, {"id": "a1-object-pronouns-01", "n": "A1", "t": "Object Pronouns (me, him, her, us, them)", "a": "I love she.", "b": "I love her.", "c": "b"}, {"id": "a1-plural-nouns-01", "n": "A1", "t": "Plural Nouns — regular & irregular", "a": "I have two childs.", "b": "I have two children.", "c": "b"}, {"id": "a1-prepositions-place-01", "n": "A1", "t": "Prepositions of Place (in, on, under, next to...)", "a": "The book is in the table.", "b": "The book is on the table.", "c": "b"}, {"id": "a1-prepositions-time-01", "n": "A1", "t": "Prepositions of Time (at, on, in)", "a": "The class starts in eight o'clock.", "b": "The class starts at eight o'clock.", "c": "b"}, {"id": "a1-present-continuous-01", "n": "A1", "t": "Present Continuous — Now (vs Present Simple)", "a": "Right now, Sofía cooks dinner.", "b": "Right now, Sofía is cooking dinner.", "c": "b"}, {"id": "a1-present-simple-frequency-01", "n": "A1", "t": "Present Simple — Adverbs of Frequency", "a": "Sofía wakes up always early.", "b": "Sofía always wakes up early.", "c": "b"}, {"id": "a1-present-simple-likes-01", "n": "A1", "t": "Present Simple — Likes, Hobbies & Free Time", "a": "I like read books.", "b": "I like reading books.", "c": "b"}, {"id": "a1-present-simple-neg-questions-01", "n": "A1", "t": "Present Simple — Negatives & Questions", "a": "Does she works here?", "b": "Does she work here?", "c": "b"}, {"id": "a1-present-simple-routines-01", "n": "A1", "t": "Present Simple — Daily Routines", "a": "Sofía work in Medellín.", "b": "Sofía works in Medellín.", "c": "b"}, {"id": "a1-present-simple-wh-questions-01", "n": "A1", "t": "Present Simple — Wh- Questions", "a": "Where you live?", "b": "Where do you live?", "c": "b"}, {"id": "a1-pronouns-possessives-01", "n": "A1", "t": "Subject Pronouns & Possessive Adjectives", "a": "She name is Sofía.", "b": "Her name is Sofía.", "c": "b"}, {"id": "a1-relative-clauses-objects-01", "n": "A1", "t": "Relative Clauses — Objects to Work & Study (a thing that you use to...)", "a": "A pen is a thing who you use to write.", "b": "A pen is a thing that you use to write.", "c": "b"}, {"id": "a1-relative-clauses-places-01", "n": "A1", "t": "Relative Clauses — Places in the City (a place where...)", "a": "A hospital is a place which people get better.", "b": "A hospital is a place where people get better.", "c": "b"}, {"id": "a1-relative-clauses-professions-01", "n": "A1", "t": "Relative Clauses — Defining People (a person who...)", "a": "A carpenter is a person which works with wood.", "b": "A carpenter is a person who works with wood.", "c": "b"}, {"id": "a1-review-grand-01", "n": "A1", "t": "A1 Grand Review — All Topics Together", "a": "The people in Medellín is very friendly.", "b": "The people in Medellín are very friendly.", "c": "b"}, {"id": "a1-review-identity-01", "n": "A1", "t": "A1 Review — Identity: To Be, Pronouns & Demonstratives", "a": "This is Sofía. Her is from Colombia.", "b": "This is Sofía. She is from Colombia.", "c": "b"}, {"id": "a1-review-modals-preps-01", "n": "A1", "t": "A1 Review — Modals & Prepositions: Advice, Duties, Time & Place", "a": "I must to clean my room on Saturday.", "b": "I must clean my room on Saturday.", "c": "b"}, {"id": "a1-review-present-simple-01", "n": "A1", "t": "A1 Review — Present Simple: Routines, Frequency, Questions & Likes", "a": "Sofía works always in the morning.", "b": "Sofía always works in the morning.", "c": "b"}, {"id": "a1-to-be-nationalities-01", "n": "A1", "t": "Verb To Be — Nationalities", "a": "I from Colombia. I Colombian.", "b": "I am from Colombia. I am Colombian.", "c": "b"}, {"id": "a1-to-be-neg-questions-01", "n": "A1", "t": "Verb To Be — Negatives & Questions", "a": "You are a teacher?", "b": "Are you a teacher?", "c": "b"}, {"id": "a1-wh-questions-bank-01", "n": "A1", "t": "Wh- Questions — Question Bank (you / he-she)", "a": "Where he works?", "b": "Where does he work?", "c": "b"}, {"id": "a2-comparatives-superlatives-01", "n": "A2", "t": "Comparatives & Superlatives — The Great Dilemmas of Life", "a": "Pizza is more better than a burger.", "b": "Pizza is better than a burger.", "c": "b"}, {"id": "a2-countables-some-any-01", "n": "A2", "t": "Countable & Uncountable — a / some / any / much / many (Food)", "a": "We don't have some eggs.", "b": "We don't have any eggs.", "c": "b"}, {"id": "a2-going-to-future-01", "n": "A2", "t": "Going to — Plans, Decisions & Predictions", "a": "I going to study tonight.", "b": "I'm going to study tonight.", "c": "b"}, {"id": "a2-past-continuous-vs-simple-01", "n": "A2", "t": "Past Continuous vs Past Simple — when / while", "a": "They was watching TV when the lights went out.", "b": "They were watching TV when the lights went out.", "c": "b"}, {"id": "a2-past-simple-irregular-01", "n": "A2", "t": "Past Simple — Irregular Verbs (patterns)", "a": "I buyed a new phone yesterday.", "b": "I bought a new phone yesterday.", "c": "b"}, {"id": "a2-past-simple-narrative-01", "n": "A2", "t": "Past Simple — Telling a Story", "a": "Did Ben went to Cartagena?", "b": "Did Ben go to Cartagena?", "c": "b"}, {"id": "a2-past-simple-regular-01", "n": "A2", "t": "Past Simple — Regular Verbs (-ed) & Time Expressions", "a": "I visit my grandma last week.", "b": "I visited my grandma last week.", "c": "b"}, {"id": "a2-review-grand-01", "n": "A2", "t": "A2 Grand Review — All Topics Together", "a": "Yesterday, when Ben arrive at the hotel, there was no towels.", "b": "Yesterday, when Ben arrived at the hotel, there were no towels.", "c": "b"}, {"id": "a2-there-is-there-are-01", "n": "A2", "t": "There is / There are — Describing the House", "a": "There is two bedrooms in my house.", "b": "There are two bedrooms in my house.", "c": "b"}, {"id": "a2-verb-to-be-past-01", "n": "A2", "t": "Verb To Be — Past (was / were)", "a": "The players was sad after the game.", "b": "The players were sad after the game.", "c": "b"}, {"id": "b1-adverbs-01", "n": "B1", "t": "Adverbs of Manner — quickly, carefully & comparatives", "a": "She sings beautiful.", "b": "She sings beautifully.", "c": "b"}, {"id": "b1-conditionals-0-1-2-01", "n": "B1", "t": "Conditionals 0, 1 & 2 — One Ice Cream, Three Realities", "a": "If I will study, I will pass the exam.", "b": "If I study, I will pass the exam.", "c": "b"}, {"id": "b1-gerund-vs-infinitive-01", "n": "B1", "t": "Gerund vs Infinitive — enjoy reading, want to read", "a": "I enjoy to read.", "b": "I enjoy reading.", "c": "b"}, {"id": "b1-passive-voice-01", "n": "B1", "t": "Passive Voice — Present, Past & Perfect", "a": "This house built in 1980.", "b": "This house was built in 1980.", "c": "b"}, {"id": "b1-present-perfect-bucket-list-01", "n": "B1", "t": "Present Perfect — The Bucket List (already / yet)", "a": "I have saw that movie.", "b": "I have seen that movie.", "c": "b"}, {"id": "b1-present-perfect-continuous-01", "n": "B1", "t": "Present Perfect Continuous — for / since / just", "a": "I have been working here since three years.", "b": "I have been working here for three years.", "c": "b"}, {"id": "b1-present-perfect-ever-experiences-01", "n": "B1", "t": "Have You Ever...? — Experiences (details in past simple)", "a": "Have you ever went to Europe?", "b": "Have you ever been to Europe?", "c": "b"}, {"id": "b1-present-perfect-vs-past-simple-01", "n": "B1", "t": "Present Perfect vs Past Simple — Which One?", "a": "I have visited Paris last year.", "b": "I visited Paris last year.", "c": "b"}, {"id": "b1-review-grand-01", "n": "B1", "t": "B1 Grand Review — All Topics Together", "a": "I have met him in 1982.", "b": "I met him in 1982.", "c": "b"}, {"id": "b1-used-to-01", "n": "B1", "t": "Used to — Past Habits That Are Gone", "a": "I use to play soccer when I was a kid.", "b": "I used to play soccer when I was a kid.", "c": "b"}, {"id": "b1-will-vs-going-to-01", "n": "B1", "t": "Will vs Going to — Plans, Decisions & Promises", "a": "Look at those clouds — it will rain.", "b": "Look at those clouds — it's going to rain.", "c": "b"}, {"id": "b2-causative-01", "n": "B2", "t": "Causative — Have / Get Something Done", "a": "I designed my logo by a professional.", "b": "I had my logo designed by a professional.", "c": "b"}, {"id": "b2-idioms-money-01", "n": "B2", "t": "Idioms — Money & Business (Abuela Carmen's Wisdom)", "a": "The phone cost an arm and a leg, so now I only have one arm.", "b": "The phone cost an arm and a leg, so I can't afford anything else this month.", "c": "b"}, {"id": "b2-idioms-time-effort-01", "n": "B2", "t": "Idioms — Time & Effort (Abuela Carmen's Wisdom)", "a": "I only see a blue moon once in a blue moon.", "b": "I only visit my hometown once in a blue moon.", "c": "b"}, {"id": "b2-linkers-01", "n": "B2", "t": "Linking Words — Contrast, Addition, Cause, Result & More", "a": "The trip was expensive, however, we decided to go.", "b": "The trip was expensive. However, we decided to go.", "c": "b"}, {"id": "b2-mixed-conditionals-01", "n": "B2", "t": "Mixed Conditionals", "a": "If she didn't study design, she wouldn't have run her studio now.", "b": "If she hadn't studied design, she wouldn't be running her studio now.", "c": "b"}, {"id": "b2-modals-deduction-past-01", "n": "B2", "t": "Modals of Deduction — Past (must have / might have / can't have)", "a": "He must lost his phone yesterday.", "b": "He must have lost his phone yesterday.", "c": "b"}, {"id": "b2-modals-deduction-present-01", "n": "B2", "t": "Modals of Deduction — Present (must / might / could / can't)", "a": "She mustn't be home; the lights are off.", "b": "She can't be home; the lights are off.", "c": "b"}, {"id": "b2-modals-obligation-past-01", "n": "B2", "t": "Modals of Obligation — Past (had to / didn't have to / needn't have)", "a": "I mustn't pay, my client covered it.", "b": "I didn't have to pay, my client covered it.", "c": "b"}, {"id": "b2-phrasal-verbs-down-01", "n": "B2", "t": "Phrasal Verbs with DOWN", "a": "She turned down the job offer because it went underground.", "b": "She turned down the job offer because the salary was too low.", "c": "b"}, {"id": "b2-phrasal-verbs-get-01", "n": "B2", "t": "Phrasal Verbs — GET: One Verb, Many Meanings", "a": "I need to get over to the new phone.", "b": "I need to get over losing my phone.", "c": "b"}, {"id": "b2-phrasal-verbs-on-off-01", "n": "B2", "t": "Phrasal Verbs with ON vs OFF", "a": "Please close the lights when you leave.", "b": "Please turn off the lights when you leave.", "c": "b"}, {"id": "b2-phrasal-verbs-out-01", "n": "B2", "t": "Phrasal Verbs with OUT", "a": "I found out the answer, I've known it for years.", "b": "I found out the answer just now, after searching for hours.", "c": "b"}, {"id": "b2-phrasal-verbs-up-01", "n": "B2", "t": "Phrasal Verbs with UP", "a": "I looked up and saw the word in the sky.", "b": "I looked up the word in the dictionary.", "c": "b"}, {"id": "b2-relative-clauses-01", "n": "B2", "t": "Relative Clauses — Non-Defining & Advanced Structures", "a": "My sister, that lives in Bogotá, is a doctor.", "b": "My sister, who lives in Bogotá, is a doctor.", "c": "b"}, {"id": "b2-reported-speech-01", "n": "B2", "t": "Reported Speech — Statements, Questions & Commands", "a": "Ben said that he loses his phone last week.", "b": "Ben said that he had lost his phone the week before.", "c": "b"}, {"id": "b2-third-conditional-01", "n": "B2", "t": "Third Conditional — If I Had Known", "a": "If Ben checked the weather, he wouldn't lose his phone.", "b": "If Ben had checked the weather, he wouldn't have lost his phone.", "c": "b"}, {"id": "b2-wish-if-only-01", "n": "B2", "t": "Wish / If Only — Regrets & Change", "a": "I wish I have more free time.", "b": "I wish I had more free time.", "c": "b"}, {"id": "c1-advanced-passive-01", "n": "C1", "t": "Advanced Passive — Reporting Verbs & Passive Infinitives", "a": "It is said the recipe is old since a hundred years.", "b": "It is said that the recipe is over a hundred years old.", "c": "b"}, {"id": "c1-cleft-sentences-01", "n": "C1", "t": "Cleft Sentences — It-Clefts & What-Clefts", "a": "Ben was who lost the phone.", "b": "It was Ben who lost the phone.", "c": "b"}, {"id": "c1-ellipsis-substitution-01", "n": "C1", "t": "Ellipsis & Substitution", "a": "Sofía can speak French, and Kenji can too so.", "b": "Sofía can speak French, and so can Kenji.", "c": "b"}, {"id": "c1-emphatic-structures-01", "n": "C1", "t": "Emphatic Structures — do/does/did & so/such", "a": "I really understand why you're upset.", "b": "I DO understand why you're upset.", "c": "b"}, {"id": "c1-future-in-the-past-01", "n": "C1", "t": "Future in the Past", "a": "Sofía will go to call the client, but she forgot.", "b": "Sofía was going to call the client, but she forgot.", "c": "b"}, {"id": "c1-gerund-clauses-subject-01", "n": "C1", "t": "Gerund Clauses as Subject", "a": "Ben lose his phone again surprised no one.", "b": "Ben losing his phone again surprised no one.", "c": "b"}, {"id": "c1-inversion-01", "n": "C1", "t": "Inversion for Emphasis", "a": "Never I have seen such a mess.", "b": "Never have I seen such a mess.", "c": "b"}, {"id": "c1-participle-clauses-01", "n": "C1", "t": "Participle Clauses", "a": "Finished the report, Sofía went home early.", "b": "Having finished the report, Sofía went home early.", "c": "b"}, {"id": "c1-register-style-01", "n": "C1", "t": "Register & Style — Formal vs Informal Rewriting (C1–C2, capstone)", "a": "Hey, just wanted to check if you got my email lol.", "b": "I'm writing to follow up on my previous email.", "c": "b"}, {"id": "c1-subjunctive-01", "n": "C1", "t": "Subjunctive — Formal & Literary Register (C1–C2)", "a": "The teacher suggested that Kenji studies more.", "b": "The teacher suggested that Kenji study more.", "c": "b"}, {"id": "c1-would-rather-prefer-01", "n": "C1", "t": "Would Rather / Would Prefer", "a": "I'd rather to stay home tonight.", "b": "I'd rather stay home tonight.", "c": "b"}];
const ORDER=['A1','A2','B1','B2','C1'];
const LVLNAME={A1:'A1',A2:'A2',B1:'B1',B2:'B2',C1:'C1/C2'};
const PER=3, NEED=2;
const st=document.getElementById('stars');
for(let i=0;i<70;i++){const s=document.createElement('i');s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';st.appendChild(s);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const byLvl={};ORDER.forEach(l=>byLvl[l]=shuffle(DIAGS.filter(d=>d.n===l)).slice(0,PER));
const plan=ORDER.flatMap(l=>byLvl[l]);
const card=document.getElementById('card');
let idx=0, lvlOk=0, passed=[], history=[];
function intro(){card.innerHTML=`
 <div class="mono">ENGLISHANGEL · PLACEMENT</div>
 <h1>Find your level ◎</h1>
 <div class="cursive">which one sounds right? trust your ear.</div>
 <p class="intro">Up to ${ORDER.length*PER} quick questions, taken from the real diagnostic bank of this site — the typical mistakes Spanish speakers make, level by level. Pass a level and you climb to the next galaxy. No time limit, no registration.</p>
 <button class="big" id="go">Start ✦</button>`;
 document.getElementById('go').onclick=ask;}
function lvlOf(i){return plan[i].n;}
function ask(){
 if(idx>=plan.length){finish(ORDER[ORDER.length-1]);return;}
 const q=plan[idx];
 const opts=shuffle([{txt:q.a,ok:q.c==='a'},{txt:q.b,ok:q.c==='b'}]);
 card.innerHTML=`
  <div class="qnum"><span class="lvltag">testing ${LVLNAME[q.n]} · ${idx%PER+1}/${PER}</span><div class="dots">${plan.map((_,i)=>`<i class="${history[i]===true?'done':history[i]===false?'bad':''}"></i>`).join('')}</div></div>
  <div class="qtext">WHICH ONE SOUNDS RIGHT?</div>
  <div id="opts"></div><div class="feedback" id="fb"></div>`;
 const box=document.getElementById('opts');
 opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o.txt;
  b.onclick=()=>{if(box.dataset.done)return;box.dataset.done=1;
   b.classList.add(o.ok?'right':'wrong');
   if(!o.ok)[...box.children].forEach(x=>{if(x!==b&&x.textContent===(q.c==='a'?q.a:q.b))x.classList.add('right');});
   history[idx]=o.ok; if(o.ok)lvlOk++;
   document.getElementById('fb').textContent=o.ok?'✦ that’s the one':'the other one — keep going';
   setTimeout(next,900);};
  box.appendChild(b);});}
function next(){
 const l=lvlOf(idx); idx++;
 const endOfLvl=idx===plan.length||lvlOf(idx)!==l;
 if(endOfLvl){
  if(lvlOk>=NEED){passed.push(l);lvlOk=0;if(idx>=plan.length)finish(passed[passed.length-1]);else ask();}
  else finish(passed.length?passed[passed.length-1]:null);}
 else ask();}
function finish(lvl){
 const placed=lvl||'A1';
 try{localStorage.setItem('ea_placement',JSON.stringify({nivel:placed,fecha:new Date().toISOString().slice(0,10)}));}catch(e){}
 const msg=lvl===null?`Everyone starts somewhere — and A1 here is a full galaxy of ${'32'} topics. Your first star is waiting.`
  :placed==='C1'?`You made it through every galaxy. The C1/C2 cluster — subjunctive, inversion, register — is your playground.`
  :`You passed every level up to <b style="color:var(--paper)">${LVLNAME[placed]}</b>. That's your galaxy — the next one up is your challenge.`;
 card.innerHTML=`
  <div class="result-star">★</div>
  <div class="mono" style="text-align:center">YOUR LEVEL</div>
  <div class="result-lvl">${LVLNAME[placed]}</div>
  <div class="cursive" style="text-align:center">you are here — marked on your universe</div>
  <p class="result-txt">${msg}</p>
  <a class="act map" href="mapa-3d.html">✦ See your galaxy in 3D</a>
  <a class="act home" href="../index.html">Browse all ${LVLNAME[placed]} topics</a>
  <a class="act home" href="placement.html">↻ Retake the test</a>`;}
intro();
</script>
